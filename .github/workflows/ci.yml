name: ci

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-sign:
    strategy:
      matrix:
        os: [windows-2025, windows-2022, windows-latest]
    runs-on: ${{ matrix.os }}

    name: Build and sign on ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore MyApi/MyApi.csproj

      - name: Build
        run: dotnet build --configuration Release --no-restore MyApi/MyApi.csproj

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign files with Artifact Signing
        uses: azure/artifact-signing-action@v1.2.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: jaxelr
          certificate-profile-name: jaxelr-pt
          files-folder: ${{ github.workspace }}/MyApi/bin/Release/net10.0
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifact on pull request
        uses: actions/upload-artifact@v6
        with:
          name: WebApp-${{ matrix.os }}
          path: ${{ github.workspace }}/MyApi/bin/Release/net10.0
